<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monster Bill</title>
    <script src="script.js" defer></script>
</head>
<body>
    <!--This is the main page of the project, where users can input their bills and save them to the database. The input fields include the amount of money, the name of the purchase, and the date of the purchase. The save button will trigger a function that saves the data to the database.-->
    <div>
        <h2>Individual Account</h2>
        <input type="number" id = "indMoney" class="Mondy" placeholder="Amount"/>
        <input type="text" id = "indPurchaseName" class="PurchaseName" placeholder="Purchase Name"/>
        <input type="date" id = "indPurchaseDate" class="PurchaseDate" placeholder="Purchase Date"/>
        <button id = "indSave" class = "save">Save</button>
    </div>
</body>
</html>
